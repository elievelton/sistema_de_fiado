<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cliente</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1 id="nomeCliente">Cliente</h1>

<!-- Saldo -->
<div class="card">
  <h2 id="saldo" class="saldo"></h2>
</div>

<!-- Nova Dívida -->
<div class="card">
  <h3>🧾 Nova Dívida</h3>

  <input type="number" id="valorDivida" placeholder="Valor da dívida">
  <button onclick="novaDivida()">Salvar</button>
</div>

<!-- Pagamento -->
<div class="card">
  <h3>💸 Registrar Pagamento</h3>

  <input type="number" id="valorPagamento" placeholder="Valor do pagamento">
  <button onclick="novoPagamento()">Registrar</button>
</div>

<!-- Ações -->
<div class="card">
  <button onclick="verDividas()">🧾 Ver dívidas</button>
  <button onclick="abrirExtrato()">📊 Ver extrato</button>
</div>

</div>

<script src="cliente.js"></script>

</body>
</html>
